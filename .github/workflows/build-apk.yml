name: Build KlyoIPTV APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # permite lanzar manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout del código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Node.js para Capacitor
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar dependencias de Capacitor
      - name: Instalar dependencias npm
        run: npm ci

      # 4. Copiar archivos web (www/) al proyecto Android
      - name: Copiar www → android/app/src/main/assets/public
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r www/. android/app/src/main/assets/public/

      # 5. Configurar Java 17
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 6. Cache de Gradle para acelerar builds
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 7. Dar permisos al wrapper de Gradle
      - name: Permisos Gradle wrapper
        run: chmod +x android/gradlew

      # 8. Compilar APK release
      - name: Compilar APK release
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace

      # 10. Renombrar APK con versión y fecha
      - name: Renombrar APK
        run: |
          DATE=$(date +'%Y%m%d')
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/KlyoIPTV-v1.0-beta-${DATE}.apk

      # 11. Subir APK como artifact de GitHub
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: KlyoIPTV-APK
          path: android/app/build/outputs/apk/release/KlyoIPTV-*.apk
          retention-days: 30

      # 12. (Opcional) Crear Release en GitHub si se hace push de un tag
      - name: Crear GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/KlyoIPTV-*.apk
          draft: false
          prerelease: true
          body: |
            ## KlyoIPTV Player APK
            Reproductor IPTV para Android — M3U, Xtream Codes, HLS, MPEG-TS
            
            ### Cambios en esta versión
            - Build automático desde GitHub Actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
