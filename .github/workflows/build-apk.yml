name: Build KlyoIPTV APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout del código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Node.js 24
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Instalar dependencias de Capacitor
      - name: Instalar dependencias npm
        run: npm install

      # 4. Copiar archivos web (www/) al proyecto Android
      - name: Copiar www al proyecto Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r www/. android/app/src/main/assets/public/

      # 5. Configurar Java 17
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 6. Cache de Gradle para acelerar builds
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 7. Dar permisos al wrapper de Gradle
      - name: Permisos Gradle wrapper
        run: chmod +x android/gradlew

      # 8. Compilar APK debug (sin necesidad de keystore)
      - name: Compilar APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      # 9. Renombrar APK con fecha
      - name: Renombrar APK
        run: |
          DATE=$(date +'%Y%m%d')
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/KlyoIPTV-v1.0-beta-${DATE}.apk

      # 10. Subir APK como artifact descargable
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: KlyoIPTV-APK
          path: android/app/build/outputs/apk/debug/KlyoIPTV-*.apk
          retention-days: 30
